<!DOCTYPE html>
<!--<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">-->
<html xmlns:th="https://www.thymeleaf.org" xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Form</title>
    <link rel="stylesheet" type="text/css"
          href="	https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css">
    <link href='https://fonts.googleapis.com/css?family=Open+Sans:400,300,300italic,400italic,600' rel='stylesheet'
          type='text/css'>
    <link rel="stylesheet" type="text/css"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js">
    <link href="https://fonts.googleapis.com/css?family=Roboto:300,400,500,700" rel="stylesheet">
</head>

<body>

<div class=" form-control ">
    <div class="card">

        <form action="#" th:action="@{/form/save}" method="post" th:object="${student}"
              style="max-width:500 px; margin: 0 auto;">
            <!--    ${student} is called from the controller-->
            <!--<form>-->
            <label>Student Id</label>
            <input type="text" th:field="*{Id}" class="form-control" required/>
            <!--    th:field="*{Id}" for binding form with database-->

            <label>First Name</label>
            <input type="text" th:field="*{FirstName}" class="form-control" required/>

            <label>Last Name</label>
            <input type="text" th:field="*{LastName}" class="form-control" required/>

            <label>Location</label>
            <input type="text" th:field="*{Location}" class="form-control" required/>

            <div class="col-8">
                <button class="btn btn-primary">Save</button>
            </div>
            <!--    <button class="btn btn-active">Cancel</button>-->
        </form>
    </div>
</div>

</body>
</html>
