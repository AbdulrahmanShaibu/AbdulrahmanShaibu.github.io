<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Student Table</title>
    <!-- CSS only -->
    <link rel="stylesheet" type="text/css" href="	https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css">
    <link href='https://fonts.googleapis.com/css?family=Open+Sans:400,300,300italic,400italic,600' rel='stylesheet' type='text/css'>
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js">
    <link href="https://fonts.googleapis.com/css?family=Roboto:300,400,500,700" rel="stylesheet">

</head>
<body>


 <div th:if="${message}" class=" alert alert-success text-center">
     [[${message}]]
 </div>

<!--This Status is not working in the codes-->
 <div th:if="${Status}" class=" alert alert-success text-center">
     [[${Status}]]
 </div>

<table style="width:50%  text-align: center;  border: 1px solid black;"
       class="table table-bordered table-light" >
    <thead class="table-dark">
    <tr>
        <th style="width:3%" scope="col">No</th>
        <th scope="col">First Name</th>
        <th scope="col">Last Name</th>
        <th scope="col">Location Name</th>
        <th scope="col">Option </th>
    </tr>
    </thead>

       <tbody class="center">

    <tr th:each="std : ${StudentList}">
        <th scope="row" th:text="${std.Id}"></th>
        <td th:text="${std.FirstName}"></td>
        <td th:text="${std.LastName}"></td>
        <td th:text="${std.Location}"></td>

        <td>
            <a class="h6 mr-2" th:href="@{'/student/Delete/'+${std.Id}}"> <button class="btn btn-danger">Delete</button></a>
<!--        <a class="h6 mr-2" th:href="@{'/student/Delete/'+${std.Id}}"><button class="btn btn-danger">Delete</button></a>-->
            <a th:href="@{ '/student/Update/' +${std.Id} }"><button type="button" class="btn btn-primary">Update</button></a>
            <a th:href="@{/Home/NewFrom}"><button type="button" class="btn btn-success">Add</button> </a>
        </td>
    </tr>

         </tbody>
</table>

</body>

</html>
